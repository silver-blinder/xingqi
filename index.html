<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xingqi</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="home-wrap">
    <h1 class="home-title" id="home-desc"></h1>
    <div class="home-img">
      <img id="home-pic" src="" alt="" style="cursor:pointer;">
    </div>
  </div>
  <script src="/nav.js"></script>
  <script>
    fetch('/data/images.json')
      .then(r => r.json())
      .then(images => {
        if (!images.length) return;
        const img = document.getElementById('home-pic');
        const desc = document.getElementById('home-desc');
        let queue = [];
        function shuffle(arr) {
          const a = arr.slice();
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }
        function show(item) {
          img.src = '/img/homepage/' + item.file;
          desc.textContent = item.desc || '';
        }
        show(images[0]);
        document.addEventListener('click', (e) => {
          if (e.target.closest('.topnav, .topnav-menu')) return;
          if (!queue.length) queue = shuffle(images.slice(1));
          show(queue.pop());
        });
      });
  </script>
</body>
</html>
