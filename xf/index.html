<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xingqi</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page-wrap">
    <h1 class="xf-page-title">想 法</h1>
    <div id="list" class="xf-list"></div>
  </div>
  <script src="/nav.js"></script>
  <script>
    fetch('/data/thoughts.json')
      .then(r => r.json())
      .then(items => {
        const list = document.getElementById('list');
        if (!items.length) { list.innerHTML = '<div class="empty">暂无想法</div>'; return; }
        list.innerHTML = items.map(t => `
          <a href="/xf/${t.id}.html" class="xf-title-link">${t.title}</a>
        `).join('');
      })
      .catch(() => {
        document.getElementById('list').innerHTML = '<div class="empty">暂无想法</div>';
      });
  </script>
</body>
</html>
