    <h1>202604010650</h1>
    <div class="poem-body">我吐了两次
一次在路上
一次在朋友家里
我感到酸液充斥着整个口腔
把整个世界都呕吐了出来
我把龙头开到最大来掩饰呕吐的狼狈的声音
尽管没什么用
我依然觉得这声音很恶心
像我一样恶心
抱着马桶吐完
穿着内裤坐在卫生间的地上
鞋印、瓷砖、水流声
分不清是鼻涕还是呕吐物
点了支烟
我第一次感到我不属于这里
我想起那对刚做完爱的朋友
很冷
很孤独
眼泪早已被吐了出来
走出卫生间
朋友依然熟睡
我想明天他也不会知道
其实起初我是想去你家的
但还好没有去
我不想在你家感到孤独</div>
  </div>
