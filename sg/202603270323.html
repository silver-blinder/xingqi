    <h1>202603270323</h1>
    <div class="poem-body">我很难表达对你的感觉
你不是她
你是你
我觉得你在躲着我
在每天喝酒的时候会想到你
可能只是因为你很能喝
其实我知道不止是这样
我告诉自己该忘记了
许多次会在那朵花面前
抽了根烟
躺在电瓶车上看着满天的星星
我和它这么的遥远
但我清楚地看见你了
你是星星
抽牌抽到大于等于八的时候我就来找你吧
很可惜
两次都是七
而你是星期</div>
