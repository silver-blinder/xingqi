<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xingqi</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page-wrap sg-detail" id="detail"></div>
  <script src="/nav.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get('id');

    fetch('/data/poems.json')
      .then(r => r.json())
      .then(poems => {
        const poem = poems.find(p => p.id === id);
        const el = document.getElementById('detail');
        if (!poem) { el.innerHTML = '<div class="empty">未找到该诗歌</div>'; return; }
        document.title = poem.title + ' · xingqi';
        el.innerHTML = `
          <h1>${poem.title}</h1>
          <div class="poem-body">${poem.body}</div>
          ${poem.date ? `<div class="poem-date">${poem.date}</div>` : ''}
        `;
      });
  </script>
</body>
</html>
