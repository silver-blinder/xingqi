    <h1>202604020351</h1>
    <div class="poem-body">那天我去人民路找你了
没看见你
只有警察
好吧其实并没有特地去找你
男人总是会想方设法地自我感动
说完戒酒的当天就又去喝了
酒精伴着尚存口腔的胃酸流入
热恋期的男人女人一同去上厕所
上了20分钟
我一个人坐在和那天一样的石阶上
爱上你的那一天
我承认直到那一刻我发现我很想你
最后变成了一句
“人民路好多警察”以及
想找你却不敢找你的48分钟后的“哎”
那天最后一首歌是秦皇岛
旁边的那对男女依然热切
我想哭
虽然我并没有很喜欢这首歌</div>
