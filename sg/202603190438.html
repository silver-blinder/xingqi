    <h1>202603190438</h1>
    <div class="poem-body">我坐在阶梯看着你在微弱黄色灯光下的侧颜
其实我觉得你很美
以至于我分不清是头发本身还是灯光映射
大多数时候我不敢和你说话
说点什么呢
原生家庭、诗与远方以及陀思妥耶夫斯基
我们只是坐着
任凭酒精慢慢滋生

我说你很美
期待和你在街角的偶遇
还是算了吧
你只在我的幻想里</div>
